services:
  testmailbox:
    build: .
    container_name: mfg-testmailbox
    restart: unless-stopped
    ports:
      - "8501:8501"
      - "2525:2525"
    volumes:
      - testmailbox-data:/data/testmailbox
    environment:
      - DOMAIN=${DOMAIN:-testmailbox.dev}
      - SMTP_PORT=${SMTP_PORT:-2525}
      - API_PORT=${API_PORT:-8501}
      - INBOX_TTL_MINUTES=${INBOX_TTL_MINUTES:-60}
      - CLEANUP_INTERVAL_SECONDS=${CLEANUP_INTERVAL_SECONDS:-300}
      - DB_PATH=/data/testmailbox/mailbox.db
    cpus: 0.5
    mem_limit: 256m

volumes:
  testmailbox-data:
